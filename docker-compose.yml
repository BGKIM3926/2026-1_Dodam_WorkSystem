version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      - REACT_APP_API_URL=http://backend:8080/api
      - REACT_APP_ENV=production
    depends_on:
      - backend
    networks:
      - dodamsys-network

  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    ports:
      - '8080:8080'
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/dodamsys
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=password
      - TZ=Asia/Seoul
      - JAVA_TOOL_OPTIONS=-Duser.timezone=Asia/Seoul
    depends_on:
      - mysql
    networks:
      - dodamsys-network

  mysql:
    image: mysql:8.0
    ports:
      - '3306:3306'
    environment:
      - MYSQL_ROOT_PASSWORD=password
      - MYSQL_DATABASE=dodamsys
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - dodamsys-network

volumes:
  mysql-data:

networks:
  dodamsys-network:
    driver: bridge
